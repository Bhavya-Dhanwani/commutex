services:
    postgres:
        image: postgres:17
        container_name: commutex-postgres
        restart: unless-stopped

        ports:
            - "5432:5432"

        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: commutex_db

        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
        name: commutex-postgres-data
